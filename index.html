<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polaris RZR AR</title>

  <!-- ✅ REQUIRED: model-viewer -->
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.jsl, body {
      margin: 0;
      height: 100%;
      background: #0d0d0d;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    #viewer {
      width: 100vw;
      height: 100vh;
    }

    #controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    button {
      padding: 10px 16px;
      background: #b8d400;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .active {
      background: #e85c0d;
      color: black;
    }
  </style>
</head>

<body>

<model-viewer
  id="mv"
  src="./RZR_SIM.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1.1"
  environment-image="neutral"
  camera-orbit="0deg 75deg 6m"
  min-camera-orbit="auto 30deg 4m"
  max-camera-orbit="auto 120deg 10m"
  style="background:#111;"
>
</model-viewer>

<div id="controls">
  <button onclick="toggleFlip()">Flip</button>
  <button onclick="hop()">Hop</button>
  <button id="snd" onclick="toggleSound()">Sound</button>
</div>

<audio id="engine" loop playsinline></audio>

<script>
const mv = document.getElementById('mv');
const engine = document.getElementById('engine');
const sndBtn = document.getElementById('snd');

let flipped = false;
let soundOn = false;
let unlocked = false;

/* ✅ AUDIO UNLOCK (REQUIRED) */
function unlock() {
  if (unlocked) return;
  engine.src = "./Engine.wav";
  engine.load();
  engine.play().then(() => {
    engine.pause();
    engine.currentTime = 0;
    unlocked = true;
  });
}

document.addEventListener('click', unlock, { once:true });
document.addEventListener('touchstart', unlock, { once:true });

function toggleSound() {
  if (!unlocked) unlock();

  if (soundOn) {
    engine.pause();
    sndBtn.classList.remove('active');
  } else {
    engine.play();
    sndBtn.classList.add('active');
  }
  soundOn = !soundOn;
}

/* ✅ HOP (CAMERA BASED) */
function hop() {
  mv.animate([
    { cameraOrbit: '0deg 75deg 6m' },
    { cameraOrbit: '0deg 82deg 5.3m' },
    { cameraOrbit: '0deg 75deg 6m' }
  ], {
    duration: 700,
    easing: 'ease-in-out'
  });
}

/* ✅ FLIP VIEW */
function toggleFlip() {
  flipped = !flipped;

  if (flipped) {
    mv.setAttribute('camera-orbit', '0deg 120deg 6m');
  } else {
    mv.setAttribute('camera-orbit', '0deg 75deg 6m');
  }
}
</script>

</body>
</html>
